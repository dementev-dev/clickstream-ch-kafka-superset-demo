global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "clickhouse"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["clickhouse:9126"]
        labels:
          instance: Clickhouse-1
    honor_labels: true

  # Kafka metrics via kafka-exporter
  # Проверено через Context7: формат scrape_configs подтверждён (/prometheus/docs)
  - job_name: "kafka"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["kafka-exporter:9308"]
        labels:
          instance: Kafka-1
    honor_labels: true

  # Airflow metrics via statsd-exporter (StatsD → Prometheus)
  - job_name: "airflow"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["statsd-exporter:9102"]
        labels:
          instance: Airflow-1
    honor_labels: true

  # Generator metrics (custom events generator)
  - job_name: "generator"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["generator:9109"]
        labels:
          instance: Generator-1
    honor_labels: true