# -----------------------------------------------------------------------------
# Dashboard Provider: автоматическая загрузка дашбордов из файлов
# Назначение: Grafana автоматически импортирует дашборды из указанной папки
# -----------------------------------------------------------------------------

apiVersion: 1

providers:
  - name: "default"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /etc/grafana/provisioning/dashboards
