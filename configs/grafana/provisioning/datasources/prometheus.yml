# -----------------------------------------------------------------------------
# DataSource: Prometheus для Grafana
# Назначение: автоматическая настройка подключения к Prometheus
# -----------------------------------------------------------------------------

apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus_uid
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST
